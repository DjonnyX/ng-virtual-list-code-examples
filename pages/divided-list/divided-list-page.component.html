<div class="vl-section bt">
  <a href="https://github.com/DjonnyX/ng-virtual-list-code-examples/tree/main/pages/divided-list">code example</a>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Vertical list with 4 columns and item binding</h2>
    <div class="scroll-to__controls">
      <input type="number" class="scroll-to__input" [(ngModel)]="itemsLength" [required]="true" [min]="0"
        [max]="100000">
      <button class="scroll-to__button" (click)="onButtonChangeItemsLengthHandler()">setup</button>
    </div>
    <ng-virtual-list class="list list-divided" [items]="items1" methodForSelecting="multi-select"
      [itemRenderer]="itemRendererGallery" [bufferSize]="1" [maxBufferSize]="1" [dynamicSize]="false" [itemSize]="80"
      (onItemClick)="onItemClick($event)" [divides]="4" [scrollbarThumbRenderer]="customScrollBarThumb"
      [scrollbarThumbParams]="customScrollBarThumbParams" [scrollbarThickness]="6" [snapToItem]="true"
      snapToItemAlign="center" [motionBlurEnabled]="motionBlurEnabled" (onSelect)="onSelectHandler($event)"
      (onScrollReachStart)="onScrollReachStartHandler()"
      (onScrollReachEnd)="onScrollReachEndHandler()"></ng-virtual-list>
  </div>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Vertical list with 2 columns, item binding and dynamic content elements</h2>
    <div class="scroll-to__controls">
      <input type="number" class="scroll-to__input" [(ngModel)]="dl2ItemId" [required]="true" [min]="minDl2Id"
        [max]="maxDl2Id">
      <button class="scroll-to__button" (click)="onButtonScrollDL2ToIdClickHandler($event)">Scroll</button>
    </div>
    <ng-virtual-list #dl2List class="list list-divided" [items]="items2" methodForSelecting="multi-select"
      [itemRenderer]="itemRendererGallery" [bufferSize]="2" [maxBufferSize]="2" [dynamicSize]="true"
      (onItemClick)="onItemClick($event)" [divides]="2" [scrollbarThumbRenderer]="customScrollBarThumb"
      [scrollbarThumbParams]="customScrollBarThumbParams" [scrollbarThickness]="6" [snapToItem]="true"
      snapToItemAlign="start" [motionBlurEnabled]="motionBlurEnabled" (onSelect)="onSelectHandler($event)"
      (onScrollReachStart)="onScrollReachStartHandler()"
      (onScrollReachEnd)="onScrollReachEndHandler()"></ng-virtual-list>
  </div>
</div>

<ng-template #itemRendererGallery let-data="data" let-config="config">
  @if (data) {
  <div [ngClass]="{'list-gallery__container': true, 'even': config.even, 'selected': config.selected}">
    <span>{{data.name}}</span>
  </div>
  }
</ng-template>

<ng-template #customScrollBarThumb let-api="api" let-width="width" let-height="height" let-fillPositions="fillPositions"
  let-params="params">
  <custom-scrollbar [api]="api" [width]="width" [height]="height" [fillPositions]="fillPositions"
    [params]="params"></custom-scrollbar>
</ng-template>
