@let _api = api();
@let _data = data();
@let _config = config();

@if (_data && _config) {
    @switch (_data.type) {
        @case ("group") {
            <div staticClick class="list__item-container group"
            [style.--background-color]="backgroundColor()"
            [style.--color]="color()"
            [style.--fill]="fill()"
                [maxStaticClickDistance]="maxStaticClickDistance"
                (onStaticClick)="onClickHandler($event); _api?.select(_data.id, true); onGroupClickHandler(_data)">
                <div class="item-wrapper group">
                    <p class="name">{{_data.name}}</p>
                </div>
            </div>
        }
        @default {
            @let class = {'selected': _config.selected};
            <div staticClick class="list__item-container" [ngClass]="class"
                [style.--background-color]="backgroundColor()"
                [style.--color]="color()"
                [style.--fill]="fill()"
                [maxStaticClickDistance]="maxStaticClickDistance"
                (onStaticClick)="onClickHandler($event); _api?.select(_data.id, true); onGroupClickHandler(_data)">
                <div class="item-wrapper">
                    <p class="name">{{_data.name}}</p>
                </div>
            </div>
        }
    }
}
