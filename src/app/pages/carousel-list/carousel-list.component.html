<div class="vl-section">
  <div class="vl-section__container">
    <h2>Deck Of Cards 3D</h2>
    <ng-virtual-list #gallery1 class="list carousel-list carousel-list-3d transpanent" [ngClass]="gallery1Classes"
      direction="horizontal" [items]="horizontalItems" [bufferSize]="5" [maxBufferSize]="5" selectingMode="select"
      [motionBlurEnabled]="motionBlurEnabled" [motionBlur]="0.005" [maxMotionBlur]="0.05"
      [itemRenderer]="itemRendererGallery" [dynamicSize]="false" [itemSize]="120" (onItemClick)="onItemClick($event)"
      (onSelect)="onSelectHandler($event)" [selectedIds]="2" [selectByClick]="true" [snapToItem]="true" alignment="center"
      snapToItemAlign="center" [itemTransform]="deckOfCards3D" [scrollbarEnabled]="false" [scrollbarThickness]="6"
      (onScrollReachStart)="onScrollReachStartHandler()" (onScrollReachEnd)="onScrollReachEndHandler()"
      (onSnapItem)="onSnapItemHandler()"></ng-virtual-list>
  </div>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Deck Of Cards 3D with dynamic elements and one by one scrolling</h2>
    <div class="vl-section__container">
      To create galleries with dynamically sized items, enable the <span class="expression">dynamicSize</span> property
      and optionally set <span class="expression">minItemSize</span> and <span class="expression">maxItemSize</span>.
    </div>
    <br />
    <ng-virtual-list #gallery2 class="list carousel-list carousel-list-3d transpanent" [ngClass]="gallery2Classes"
      direction="horizontal" [items]="dynamicItems" [bufferSize]="5" [maxBufferSize]="5" selectingMode="select"
      [itemRenderer]="itemRendererGallery" [dynamicSize]="true" [minItemSize]="60" [itemSize]="60" [maxItemSize]="200" alignment="center"
      (onItemClick)="onItemClick($event)" [stickyEnabled]="true" (onSelect)="onSelectHandler($event)" [selectedIds]="2"
      [motionBlurEnabled]="motionBlurEnabled" [motionBlur]="0.005" [maxMotionBlur]="0.05"
      [selectByClick]="true" [snapToItem]="true" [itemTransform]="deckOfCards3DDynamic"
      snapToItemAlign="center" [scrollbarEnabled]="false" [scrollbarThickness]="6"
      (onScrollReachStart)="onScrollReachStartHandler()" (onScrollReachEnd)="onScrollReachEndHandler()"
      (onSnapItem)="onSnapItemHandler()"></ng-virtual-list>
  </div>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Deck Of Cards</h2>
    <ng-virtual-list #gallery3 class="list carousel-list transpanent" [ngClass]="gallery3Classes" direction="horizontal"
      [items]="horizontalItems" [bufferSize]="5" [maxBufferSize]="5" [motionBlurEnabled]="motionBlurEnabled" [motionBlur]="0.015"
      [maxMotionBlur]="0.1" alignment="center" selectingMode="select" [itemRenderer]="itemRendererGallery" [dynamicSize]="false"
      [itemSize]="120" (onItemClick)="onItemClick($event)" (onSelect)="onSelectHandler($event)" [selectedIds]="2" [selectByClick]="true"
      [snapToItem]="true" snapToItemAlign="center" [itemTransform]="deckOfCards" [scrollbarEnabled]="false"
      [scrollbarThickness]="6" (onScrollReachStart)="onScrollReachStartHandler()"
      (onScrollReachEnd)="onScrollReachEndHandler()" (onSnapItem)="onSnapItemHandler()"></ng-virtual-list>
  </div>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Event Horizon</h2>
    <ng-virtual-list #gallery4 class="list carousel-list" [ngClass]="gallery4Classes" direction="horizontal"
      [items]="horizontalItems" [bufferSize]="10" [maxBufferSize]="10" alignment="center"
      selectingMode="select" [itemRenderer]="itemRendererGallery" [dynamicSize]="false" [itemSize]="120"
      (onItemClick)="onItemClick($event)" (onSelect)="onSelectHandler($event)" [selectedIds]="2" [selectByClick]="true"
      [snapToItem]="true" snapToItemAlign="center" [itemTransform]="eventHorizon" [scrollbarEnabled]="false"
      [scrollbarThickness]="6" (onScrollReachStart)="onScrollReachStartHandler()"
      (onScrollReachEnd)="onScrollReachEndHandler()"></ng-virtual-list>
  </div>
</div>

<div class="vl-section">
  <div class="vl-section__container">
    <h2>Linear</h2>
    <ng-virtual-list #gallery5 class="list carousel-list" [ngClass]="gallery5Classes" direction="horizontal" alignment="center"
      [items]="horizontalItems" [bufferSize]="5" [maxBufferSize]="5" [motionBlurEnabled]="motionBlurEnabled" [motionBlur]="0.015"
      [maxMotionBlur]="0.1" selectingMode="select" [itemRenderer]="itemRendererGallery" [dynamicSize]="false" [itemSize]="120"
      (onItemClick)="onItemClick($event)" (onSelect)="onSelectHandler($event)" [selectedIds]="2" [selectByClick]="true"
      [snapToItem]="true" snapToItemAlign="center" [itemTransform]="linear" [scrollbarEnabled]="false"
      [scrollbarThickness]="6" (onScrollReachStart)="onScrollReachStartHandler()"
      (onScrollReachEnd)="onScrollReachEndHandler()" (onSnapItem)="onSnapItemHandler()"></ng-virtual-list>
  </div>
</div>

<ng-template #itemRendererGallery let-data="data" let-config="config">
  @if (data) {
  <div [ngClass]="{'carousel-list__container': true, 'even': config.even, 'selected': config.selected}">
    <span>{{data.name}}</span>
  </div>
  }
</ng-template>

<div class="invisible">
  <audio #audioSnap [controls]="false" [autoplay]="false">
    <source src="snap.mp3" type="audio/ogg">
  </audio>
</div>
